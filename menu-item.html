<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hannah's Hot Pot – Menu Item</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --brand: #D43728;
  --brand-dark: #A8281C;
  --gold: #E8A838;
  --cream: #FFF8F0;
  --dark: #1A1A2E;
  --text: #2D2D44;
  --text-light: #6B6B80;
  --bg: #FEFCF8;
  --card: #FFFFFF;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Lato', sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
}
.container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--text-light); text-decoration: none;
  font-size: 0.9rem; margin-bottom: 24px; transition: color 0.2s;
}
.back-link:hover { color: var(--brand); }
.item-page { padding: 120px 0 60px; }
.item-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
.item-image {
  width: 100%; aspect-ratio: 4/3;
  border-radius: var(--radius); background-size: cover; background-position: center;
  box-shadow: var(--shadow);
}
.item-tag {
  display: inline-block;
  background: var(--brand); color: #fff; padding: 6px 16px; border-radius: 50px;
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 16px;
}
.item-name { font-size: 2.2rem; color: var(--dark); margin-bottom: 12px; line-height: 1.2; }
.item-price { font-size: 1.8rem; font-weight: 700; color: var(--brand); margin-bottom: 16px; }
.item-desc { font-size: 1.05rem; color: var(--text-light); line-height: 1.8; margin-bottom: 32px; }
.item-actions { display: flex; gap: 16px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 50px;
  font-weight: 600; font-size: 0.95rem; text-decoration: none; transition: all 0.3s; cursor: pointer; border: none;
}
.btn-primary { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,55,40,0.3); }
.btn-outline-dark { border: 2px solid var(--text); color: var(--text); background: transparent; }
.btn-outline-dark:hover { border-color: var(--brand); color: var(--brand); transform: translateY(-2px); }

.not-found { text-align: center; padding: 120px 24px; }
.not-found h2 { font-size: 2rem; color: var(--dark); margin-bottom: 12px; }
.not-found p { color: var(--text-light); margin-bottom: 24px; }

@media (max-width: 768px) {
  .item-layout { grid-template-columns: 1fr; gap: 24px; }
  .item-name { font-size: 1.6rem; }
  .item-price { font-size: 1.4rem; }
}
</style>
</head>
<body>

<section class="item-page">
<div class="container" id="itemContainer">
  <a href="index.html#menu" class="back-link"><i class="fas fa-arrow-left"></i> Back to Menu</a>
  <div id="itemContent"></div>
</div>
</section>

<script src="menu-data.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get('id');
const container = document.getElementById('itemContent');

if (!slug) {
  container.innerHTML = '<div class="not-found"><h2>No item selected</h2><p>Browse our menu to find your favourite dish.</p><a href="index.html#menu" class="btn btn-primary"><i class="fas fa-utensils"></i> View Menu</a></div>';
} else {
  const item = getItemBySlug(slug);
  if (item) {
    document.title = item.name + ' – Hannah\'s Hot Pot';
    const waMsg = `I want to order ${item.name} (${item.price}) from Hannah's Hot Pot`;
    container.innerHTML = `
      <div class="item-layout">
        <div class="item-image" style="background-image:url('${item.img}')"></div>
        <div>
          <span class="item-tag">${item.tag}</span>
          <h1 class="item-name">${item.name}</h1>
          <div class="item-price">${item.price}</div>
          <p class="item-desc">${item.desc}</p>
          <div class="item-actions">
            <a href="https://wa.me/2348160894006?text=${encodeURIComponent(waMsg)}" target="_blank" class="btn btn-primary"><i class="fab fa-whatsapp"></i> Order on WhatsApp</a>
            <a href="index.html#menu" class="btn btn-outline-dark"><i class="fas fa-arrow-left"></i> Back to Menu</a>
          </div>
        </div>
      </div>
    `;
  } else {
    container.innerHTML = '<div class="not-found"><h2>Item not found</h2><p>Sorry, we couldn\'t find that menu item.</p><a href="index.html#menu" class="btn btn-primary"><i class="fas fa-utensils"></i> View Menu</a></div>';
  }
}
</script>
</body>
</html>
